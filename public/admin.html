<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Panel – DR-HONEY-MINI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--c-main:#6c3adb;--c-bright:#8b5cf6;--c-deep:#1a0933;--c-mid:#2d1b56;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;background:var(--c-deep);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .container{background:rgba(255,255,255,0.97);border-radius:24px;padding:36px 28px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,0.4);}
    h1{font-size:1.4rem;font-weight:800;color:var(--c-main);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
    .sub{color:#9ca3af;font-size:0.8rem;margin-bottom:24px;}
    .login-wrap{display:flex;flex-direction:column;gap:12px;}
    input[type=password]{width:100%;padding:13px 16px;border-radius:12px;border:2px solid #ede9fe;font-size:0.95rem;font-family:'Poppins',sans-serif;outline:none;transition:border-color 0.3s;}
    input[type=password]:focus{border-color:var(--c-main);}
    .login-btn{padding:13px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--c-main),var(--c-bright));color:#fff;font-size:0.95rem;font-weight:700;cursor:pointer;transition:transform 0.2s;}
    .login-btn:hover{transform:translateY(-1px);}
    .err{color:#ef4444;font-size:0.82rem;text-align:center;display:none;}
    /* PANEL */
    #panel{display:none;}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .logout-btn{padding:6px 14px;border-radius:20px;border:none;background:#f3f0ff;color:var(--c-main);font-size:0.78rem;font-weight:700;cursor:pointer;}
    .section-title{font-size:0.85rem;font-weight:700;color:var(--c-main);margin:18px 0 10px;display:flex;align-items:center;gap:6px;}
    .stat-boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
    .stat-box{background:#f3f0ff;border-radius:12px;padding:14px;text-align:center;}
    .stat-box .n{font-size:1.6rem;font-weight:800;color:var(--c-main);}
    .stat-box .l{font-size:0.7rem;color:#9ca3af;font-weight:600;}
    .session-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
    .session-item{display:flex;align-items:center;justify-content:space-between;background:#f9f5ff;border-radius:12px;padding:11px 14px;border:1px solid #ede9fe;}
    .session-id{font-size:0.8rem;font-weight:600;color:#374151;font-family:monospace;}
    .disc-btn{padding:5px 12px;border-radius:20px;border:none;background:#fee2e2;color:#dc2626;font-size:0.75rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
    .disc-btn:hover{background:#fecaca;}
    .empty-msg{text-align:center;color:#9ca3af;font-size:0.82rem;padding:20px;}
    .refresh-btn{padding:7px 16px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--c-main),var(--c-bright));color:#fff;font-size:0.78rem;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>
<div class="container">
  <!-- Login -->
  <div id="loginArea">
    <h1><i class="fas fa-lock"></i> Admin Panel</h1>
    <p class="sub">DR-HONEY-MINI — Protected Access</p>
    <div class="login-wrap">
      <input type="password" id="adminPass" placeholder="Enter admin password" />
      <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
      <p class="err" id="loginErr">❌ Wrong password!</p>
    </div>
  </div>

  <!-- Panel -->
  <div id="panel">
    <div class="panel-header">
      <h1><i class="fas fa-shield-alt"></i> Admin Panel</h1>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>

    <div class="stat-boxes">
      <div class="stat-box"><div class="n" id="adTotal">0</div><div class="l">Total Users</div></div>
      <div class="stat-box"><div class="n" id="adActive">0</div><div class="l">Active Bots</div></div>
    </div>

    <div class="section-title"><i class="fas fa-wifi"></i> Active Sessions <button class="refresh-btn" onclick="loadSessions()">Refresh</button></div>
    <div class="session-list" id="sessionList"><div class="empty-msg">Loading...</div></div>
  </div>
</div>

<script>
  const ADMIN_PASS = localStorage.getItem('adminPass') || '';

  function doLogin() {
    const pass = document.getElementById('adminPass').value.trim();
    fetch('/api/admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ password: pass })
    }).then(r=>r.json()).then(d=>{
      if (d.ok) {
        localStorage.setItem('adminPass', pass);
        showPanel();
      } else {
        document.getElementById('loginErr').style.display='block';
      }
    }).catch(()=>{ document.getElementById('loginErr').style.display='block'; });
  }

  function doLogout() {
    localStorage.removeItem('adminPass');
    document.getElementById('panel').style.display='none';
    document.getElementById('loginArea').style.display='block';
    document.getElementById('adminPass').value='';
  }

  function showPanel() {
    document.getElementById('loginArea').style.display='none';
    document.getElementById('panel').style.display='block';
    loadSessions();
    loadStats();
  }

  function authHeader() {
    return { 'Content-Type':'application/json', 'x-admin-pass': localStorage.getItem('adminPass')||'' };
  }

  function loadStats() {
    fetch('/api/admin/stats', { headers: authHeader() })
      .then(r=>r.json()).then(d=>{
        document.getElementById('adTotal').textContent  = d.totalUsers || 0;
        document.getElementById('adActive').textContent = d.activeSockets || 0;
      }).catch(()=>{});
  }

  function loadSessions() {
    document.getElementById('sessionList').innerHTML = '<div class="empty-msg">Loading...</div>';
    fetch('/api/admin/sessions', { headers: authHeader() })
      .then(r=>r.json()).then(d=>{
        const list = document.getElementById('sessionList');
        if (!d.sessions || d.sessions.length===0) {
          list.innerHTML='<div class="empty-msg">No active sessions.</div>';
          return;
        }
        list.innerHTML='';
        d.sessions.forEach(s=>{
          const item = document.createElement('div');
          item.className='session-item';
          item.innerHTML=`<span class="session-id">${s.id}</span><button class="disc-btn" onclick="disconnectSession('${s.id}')">Disconnect</button>`;
          list.appendChild(item);
        });
      }).catch(()=>{ document.getElementById('sessionList').innerHTML='<div class="empty-msg">Error loading sessions.</div>'; });
  }

  function disconnectSession(id) {
    if (!confirm('Disconnect session: ' + id + '?')) return;
    fetch('/api/admin/disconnect', {
      method:'POST',
      headers: authHeader(),
      body: JSON.stringify({ sessionId: id })
    }).then(r=>r.json()).then(d=>{
      if (d.ok) { loadSessions(); loadStats(); }
    }).catch(()=>{});
  }

  // Auto-login if stored
  if (localStorage.getItem('adminPass')) showPanel();

  // Enter key
  document.addEventListener('keypress', e=>{ if(e.key==='Enter') doLogin(); });
  setInterval(()=>{ if(document.getElementById('panel').style.display!=='none') { loadStats(); loadSessions(); } }, 10000);
</script>
</body>
</html>
